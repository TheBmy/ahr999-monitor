name: AHR999 Monitor Daily

on:
  schedule:
    # 每天北京时间早上 8:00 执行 (UTC时间 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动点击运行，方便测试

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run AHR999 Script
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python main.py
